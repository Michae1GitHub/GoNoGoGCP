<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Access Denied — GoNoGo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family:'Inter',sans-serif; background:#f1f5f9; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .box { background:white; border-radius:16px; padding:48px; text-align:center; max-width:400px; box-shadow:0 4px 24px rgba(0,0,0,0.08); }
  .icon { font-size:3rem; margin-bottom:16px; }
  h1 { font-size:1.5rem; font-weight:700; color:#0f172a; margin-bottom:8px; }
  p  { color:#64748b; font-size:0.9rem; margin-bottom:24px; }
  a  { display:inline-block; padding:10px 24px; background:#2563eb; color:white; border-radius:9px; text-decoration:none; font-weight:600; font-size:0.9rem; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">🔒</div>
  <h1>Access Denied</h1>
  <p>The Admin Panel is restricted to authorized developers only. Please sign in with a developer account.</p>
  <a href="/">Back to Login</a>
</div>
</body>
</html>
